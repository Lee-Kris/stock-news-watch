name: Stock News Watch
# stock news watcher: fetch per-ticker news and email new links.

on:
  schedule:
    # 하루 1번 실행: 06:00 KST = 21:00 UTC(전날). GitHub 사정에 따라 몇 분 지연될 수 있음.
    - cron: "0 21 * * *"   # 06:00 KST (오전 6시)
  workflow_dispatch:   # Actions 탭에서 "Run workflow" 버튼으로 수동 실행/테스트
    inputs:
      force:
        description: "지금 최근 뉴스를 강제로 발송/블로그 포스팅 (테스트용)"
        type: boolean
        default: false

# seen.json 을 커밋해서 상태를 보존하려면 쓰기 권한이 필요합니다.
permissions:
  contents: write

# 같은 워크플로가 겹쳐 돌지 않도록 직렬화 (상태 파일 충돌 방지).
concurrency:
  group: stock-news-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news watcher
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BLOGGER_EMAIL: ${{ secrets.BLOGGER_EMAIL }}
          FORCE_SEND: ${{ inputs.force && '1' || '0' }}
        run: python news_watcher.py

      - name: Persist seen.json
        run: |
          if [ -z "$(git status --porcelain seen.json)" ]; then
            echo "seen.json unchanged; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seen.json
          git commit -m "chore: update seen news state [skip ci]"
          # Retry with rebase so a concurrent push (e.g. an edit to tickers.txt)
          # doesn't lose the updated state on a "fetch first" rejection.
          for attempt in 1 2 3; do
            if git pull --rebase --autostash origin "$GITHUB_REF_NAME" && git push; then
              exit 0
            fi
            echo "push attempt $attempt rejected; retrying in 5s..."
            sleep 5
          done
          echo "::error::failed to push seen.json after 3 attempts"
          exit 1
